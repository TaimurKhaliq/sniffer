<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Broken Tab Fixture</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui; background: #f8fafc; color: #0f172a; }
    main { max-width: 760px; margin: 48px auto; background: white; border: 1px solid #dbe3ef; border-radius: 8px; padding: 24px; }
    [role="tab"] { border: 1px solid #cbd5e1; background: #f8fafc; border-radius: 6px; margin-right: 8px; padding: 8px 14px; }
    [role="tabpanel"] { margin-top: 18px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 18px; }
  </style>
</head>
<body>
  <main>
    <h1>Account dashboard</h1>
    <div role="tablist" aria-label="Account sections">
      <button role="tab" aria-selected="true" onclick="show('overview')">Overview</button>
      <button role="tab" aria-selected="false" onclick="show('overview')">Details</button>
      <button role="tab" aria-selected="false" onclick="show('settings')">Settings</button>
    </div>
    <section role="tabpanel" id="panel">Overview panel: account summary and recent activity.</section>
  </main>
  <script>
    function show(name) {
      const panel = document.querySelector('#panel');
      if (name === 'settings') panel.textContent = 'Settings panel: notification and privacy controls.';
      else panel.textContent = 'Overview panel: account summary and recent activity.';
    }
  </script>
</body>
</html>
